version: '3.8'

networks:
  tmdt-network:
    driver: bridge
    name: tmdt-network

volumes:
  mysql_data:

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq_tmdt
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: tmdt
      RABBITMQ_DEFAULT_PASS: tmdt2026
    networks:
      - tmdt-network

  mysql:
    image: mysql:8
    container_name: mysql_tmdt
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tmdt-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: tmdt
        HAS_PRISMA: "false"
    container_name: api_gateway_tmdt
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      - rabbitmq
    networks:
      - tmdt-network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: user-service
        HAS_PRISMA: "true"
    container_name: user_service_tmdt
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.docker
    depends_on:
      - rabbitmq
      - mysql
    networks:
      - tmdt-network

  review-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: review-service
        HAS_PRISMA: "true"
    container_name: review_service_tmdt
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env.docker
    depends_on:
      - rabbitmq
      - mysql
    networks:
      - tmdt-network

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: product-service
        HAS_PRISMA: "true"
    container_name: product_service_tmdt
    restart: unless-stopped
    ports:
      - "3004:3004"
    env_file:
      - .env.docker
    depends_on:
      - rabbitmq
      - mysql
    networks:
      - tmdt-network

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: inventory-service
        HAS_PRISMA: "true"
    container_name: inventory_service_tmdt
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - .env.docker
    depends_on:
      - rabbitmq
      - mysql
    networks:
      - tmdt-network

  config-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: config-service
        HAS_PRISMA: "true"
    container_name: config_service_tmdt
    restart: unless-stopped
    ports:
      - "3011:3011"
    env_file:
      - .env.docker
    depends_on:
      - rabbitmq
      - mysql
    networks:
      - tmdt-network
    
