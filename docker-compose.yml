  promotion-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: promotion-service
        HAS_PRISMA: "true"
    container_name: promotion_service_tmdt
    restart: unless-stopped
    ports:
      - "3006:3006"
    env_file:
      - .env.docker
    depends_on:
